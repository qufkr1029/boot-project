<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 에어컨 제어</title>
    <!-- 외부 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <!-- 커스텀 스타일 -->
    <link rel="stylesheet" th:href="@{/css/aircon/aircon.css}">
    <script th:src="@{/js/aircon/aircon.js}" defer></script>
</head>
<body th:classappend="${initialState} ? 'on-bg' : ''">

    <div class="card">
        <!-- 상태 배지 -->
        <div id="statusBadge" 
             th:class="'status-badge ' + (${initialState} ? 'status-on' : 'status-off')" 
             th:text="${initialState} ? '에어컨 켜짐' : '에어컨 꺼짐'">
            상태 확인 중...
        </div>

        <!-- 선풍기 아이콘 -->
        <div class="fan-container">
            <svg id="fanIcon" 
                 th:class="'fan ' + (${initialState} ? 'spinning' : '')" 
                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 9c0-3.5 3-6 3-6s3 2.5 3 6c0 1.5-1 2.5-3 3"></path>
                <path d="M15 12c3.5 0 6 3 6 3s-2.5 3-6 3c-1.5 0-2.5-1-3-3"></path>
                <path d="M12 15c0 3.5-3 6-3 6s-3-2.5-3-6c0-1.5 1-2.5 3-3"></path>
                <path d="M9 12c-3.5 0-6-3-6-3s2.5-3 6-3c1.5 0 2.5 1 3 3"></path>
            </svg>
        </div>

        <!-- 제어 버튼 -->
        <button id="toggleBtn" class="btn-toggle">전원 토글</button>
    </div>

    <a th:href="@{/}" class="link-home">메인으로 돌아가기</a>
</body>
</html>
