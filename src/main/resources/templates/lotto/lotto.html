<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>로또 6/45 예상 번호</title>
	<link rel="stylesheet" th:href="@{/css/lotto/lotto.css}" />
	<script th:inline="javascript">
		/*<![CDATA[*/
		window.initialGames = /*[[${games}]]*/ [];
		/*]]>*/
	</script>
	<script th:src="@{/js/lotto/lotto.js}" defer></script>
</head>
<body>
	<header class="header">
		<h1>🍀 로또 6/45 예상 번호</h1>
		<p style="color: #64748b; font-size: 0.9rem;">행운의 번호를 확인해 보세요!</p>
	</header>

	<main>
		<div class="copy-all-container">
			<button id="btn-copy-all" class="btn-copy-all" title="전체 복사">
				<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
				전체 복사
			</button>
		</div>

		<ol id="game-list" class="game-container" aria-label="로또 예상 번호 목록"></ol>

		<section class="actions">
			<div class="btn-group">
				<button id="btn-server" class="btn-generate btn-server">서버에서 번호 받기</button>
				<button id="btn-client" class="btn-generate">브라우저에서 생성</button>
			</div>
			<a th:href="@{/}" class="link-home">홈으로 돌아가기</a>
		</section>
	</main>
</body>
</html>
