<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title th:text="${appTitle}">Introduction</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" th:href="@{/css/home/intro.css}" />
	<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
	<script th:inline="javascript">
		/*<![CDATA[*/
		window.initialState = /*[[${initialState}]]*/ false;
		window.serverTime = /*[[${serverTime}]]*/ Date.now();
		/*]]>*/
	</script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<script th:src="@{/js/home/intro.js}" defer></script>
</head>
<body>
	<canvas id="bg-canvas-2d" class="bg-canvas"></canvas>
	<canvas id="bg-canvas-3d" class="bg-canvas"></canvas>

	<div class="bg-selector-panel">
		<span class="bg-label">배경 효과</span>
		<select id="bg-effect-select" class="bg-select">
			<option value="2d">2D 라인 네트워크</option>
			<option value="3d">3D 코스믹 소용돌이 은하</option>
		</select>
	</div>
	

	<main class="glass-card">
		<header class="header-section">
			<h1 class="title-gradient" th:text="${appTitle}">Introduction</h1>
			<p class="subtitle">Spring Boot 공부방입니다.</p>
			<div class="time-badge">
				<span class="time-label">현재 시간</span>
				<span id="current-time" class="time-value">-</span>
			</div>
		</header>

		<section class="links-section">
			<h2>주요 서비스 바로가기</h2>
			<ul class="nav-links">
				<li>
					<a th:href="@{/api/hello}" class="nav-item">
						<span class="icon">🔌</span>
						<span class="label">/api/hello</span>
						<span class="desc">JSON 데이터</span>
					</a>
				</li>
				<li>
					<a th:href="@{/api/bye}" class="nav-item">
						<span class="icon">🔌</span>
						<span class="label">/api/bye</span>
						<span class="desc">JSON 데이터</span>
					</a>
				</li>
				<li>
					<a th:href="@{/lotto}" class="nav-item">
						<span class="icon">🍀</span>
						<span class="label">로또 6/45</span>
						<span class="desc">예상 번호 생성</span>
					</a>
				</li>
				<li>
					<a th:href="@{/pension-lotto}" class="nav-item">
						<span class="icon">🪙</span>
						<span class="label">연금복권 720+</span>
						<span class="desc">예상 번호 생성</span>
					</a>
				</li>
				<li>
					<a th:href="@{/aircon}" class="nav-item">
						<span class="icon">❄️</span>
						<span class="label">실시간 에어컨 제어</span>
						<span class="desc">WebSocket</span>
					</a>
				</li>
				<li>
					<a th:href="@{/aircon}" class="nav-item">
						<span class="icon">
							<svg id="intro-fan-icon" class="fan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<circle cx="12" cy="12" r="3"></circle>
								<path d="M12 9c0-3.5 3-6 3-6s3 2.5 3 6c0 1.5-1 2.5-3 3"></path>
								<path d="M15 12c3.5 0 6 3 6 3s-2.5 3-6 3c-1.5 0-2.5-1-3-3"></path>
								<path d="M12 15c0 3.5-3 6-3 6s-3-2.5-3-6c0-1.5 1-2.5 3-3"></path>
								<path d="M9 12c-3.5 0-6-3-6-3s2.5-3 6-3c1.5 0 2.5 1 3 3"></path>
							</svg>
						</span>
						<span class="label">에어컨 작동 상태</span>
						<span id="aircon-status-badge" class="status-badge-mini status-off">
							상태 확인 중...
						</span>
					</a>
				</li>
				<li>
					<a th:href="@{/pdf-viewer}" class="nav-item">
						<span class="icon">📄</span>
						<span class="label">PDF 뷰어 테스트</span>
						<span class="desc">iframe</span>
					</a>
				</li>
			</ul>
		</section>
	</main>
</body>
</html>
