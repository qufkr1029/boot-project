<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title th:text="${appTitle}">PDF Viewer Test</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" th:href="@{/css/home/intro.css}" />
	<link rel="stylesheet" th:href="@{/css/home/pdf-viewer.css}" />
</head>
<body>
	<main class="glass-card pdf-card">
		<header class="header-section">
			<h1 class="title-gradient">PDF 뷰어</h1>
			<p class="subtitle">해상도에 따라 최적화된 PDF 보기 방식을 제공합니다. (1280x720 이상: 뷰어 / 이하: 다운로드)</p>
		</header>

		<!-- 안내 배너 -->
		<div class="info-banner">
			<span class="info-icon">💡</span>
			<div class="info-text">
				준비하신 PDF 파일은 <code>src/main/resources/static/pdf/sample.pdf</code> 경로에 업로드하시면 아래 화면에 자동으로 반영됩니다.
			</div>
		</div>

		<div class="viewer-wrapper">
			<!-- 데스크톱용 뷰어 (1280x720 이상) -->
			<div id="viewer-iframe" class="responsive-viewer">
				<div class="tech-spec">
					<h4>🌐 <code>&lt;iframe&gt;</code> 기반 뷰어</h4>
					<p>고해상도 환경에서는 브라우저 내장 PDF 리더를 통해 즉시 확인이 가능합니다.</p>
				</div>
				<div class="viewer-container">
					<iframe th:src="@{/pdf/sample.pdf#toolbar=1&navpanes=0&scrollbar=1}"
						width="100%"
						height="700px"
						frameborder="0">
					</iframe>
				</div>
			</div>

			<!-- 모바일/저해상도용 다운로드 버튼 (1280x720 미만) -->
			<div id="viewer-download" class="responsive-download">
				<div class="download-card">
					<div class="download-icon">📄</div>
					<h3>PDF 파일을 확인하세요</h3>
					<p>현재 해상도에서는 직접 보기보다 다운로드하여 확인하는 것을 권장합니다.</p>
					<a th:href="@{/pdf/sample.pdf}" class="btn-download" download>
						<span class="icon">↓</span> PDF 다운로드
					</a>
				</div>
			</div>
		</div>
	</main>

	<!-- 홈으로 이동 버튼 (카드 외부로 이동) -->
	<nav class="actions">
		<a th:href="@{/}" class="link-home">홈으로 돌아가기</a>
	</nav>
</body>
</html>
